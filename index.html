<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายชื่อฝึกอบรม การเพ้นท์เล็บเบื้องต้น</title>
    <!-- โหลด Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลด Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* โทนสีชมพูตุ่น/กะปิเข้ม (Dark Mauve) ช่วยถนอมสายตา ลดแสงสะท้อน */
        body {
            background-color: #2d222b; /* สีพื้นหลังมืด โทนม่วงอมชมพู */
            color: #fce7f3; /* ตัวอักษรสีชมพูอ่อนมาก */
        }
        .card-bg {
            background-color: #3e2f3b; /* สีการ์ดที่สว่างขึ้นมานิดหน่อย */
        }
        .card-border {
            border-color: #584454; /* สีขอบการ์ด */
        }
        /* ปรับแต่ง Scrollbar ซ่อน */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans min-h-screen selection:bg-pink-500/30">

    <!-- Top Navigation Bar -->
    <nav class="card-bg border-b card-border sticky top-0 z-20 shadow-md shadow-black/10">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#d946ef]/80 rounded-xl flex items-center justify-center text-white shadow-lg shadow-[#d946ef]/20">
                    <i data-lucide="users" class="w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-pink-50 leading-tight">รายชื่อฝึกอบรม การเพ้นท์เล็บเบื้องต้น</h1>
                    <p class="text-xs text-pink-300/70">สำนักงานพัฒนาฝีมือแรงงานลพบุรี</p>
                </div>
            </div>
            <div class="flex gap-3">
                <span class="bg-pink-500/20 border border-pink-500/30 text-pink-300 text-xs px-3 py-1.5 rounded-full font-medium" id="badgeTotalTrainees">
                    10 ผู้เข้าอบรม
                </span>
                <span class="bg-orange-500/20 border border-orange-500/30 text-orange-300 text-xs px-3 py-1.5 rounded-full font-medium" id="badgeTotalReserves">
                    3 สำรอง
                </span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6">
        
        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <!-- Card 1 -->
            <div class="card-bg rounded-xl p-5 border card-border flex items-center gap-4 shadow-sm shadow-black/5">
                <div class="p-3 bg-pink-500/10 rounded-lg text-pink-400">
                    <i data-lucide="layers" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-xs text-pink-300/70 font-medium">จำนวนรุ่นทั้งหมด</p>
                    <p class="text-xl font-bold text-pink-300 mt-0.5" id="statBatches">3 รุ่น</p>
                </div>
            </div>
            <!-- Card 2 -->
            <div class="card-bg rounded-xl p-5 border card-border flex items-center gap-4 shadow-sm shadow-black/5">
                <div class="p-3 bg-[#c084fc]/10 rounded-lg text-[#c084fc]">
                    <i data-lucide="users" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-xs text-pink-300/70 font-medium">ผู้เข้าอบรมทั้งหมด</p>
                    <p class="text-xl font-bold text-[#c084fc] mt-0.5" id="statTrainees">10 คน</p>
                </div>
            </div>
            <!-- Card 3 -->
            <div class="card-bg rounded-xl p-5 border card-border flex items-center gap-4 shadow-sm shadow-black/5">
                <div class="p-3 bg-orange-500/10 rounded-lg text-orange-400">
                    <i data-lucide="user-minus" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-xs text-pink-300/70 font-medium">รายชื่อสำรอง</p>
                    <p class="text-xl font-bold text-orange-400 mt-0.5" id="statReserves">3 คน</p>
                </div>
            </div>
            <!-- Card 4 -->
            <div class="card-bg rounded-xl p-5 border card-border flex items-center gap-4 shadow-sm shadow-black/5">
                <div class="p-3 bg-rose-500/10 rounded-lg text-rose-400">
                    <i data-lucide="bar-chart-2" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-xs text-pink-300/70 font-medium">เฉลี่ยต่อรุ่น</p>
                    <p class="text-xl font-bold text-rose-400 mt-0.5" id="statAverage">3 คน</p>
                </div>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i data-lucide="search" class="w-5 h-5 text-pink-300/50"></i>
            </div>
            <input
                type="text"
                id="searchInput"
                placeholder="ค้นหารายชื่อผู้เข้าอบรม..."
                class="block w-full pl-11 pr-4 py-3 card-bg border card-border rounded-xl text-pink-100 placeholder-pink-300/50 focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition-colors shadow-sm shadow-black/5"
            >
        </div>

        <!-- Tabs -->
        <div class="border-b card-border flex gap-6 overflow-x-auto hide-scrollbar" id="tabsContainer">
            <!-- สร้างผ่าน JS -->
        </div>

        <!-- Lists Container -->
        <div id="listsContainer" class="space-y-6">
            <!-- เนื้อหาถูกสร้างด้วย JS -->
        </div>

    </main>

    <script>
        // --- ข้อมูลจำลองอ้างอิงจากภาพ ---
        const maxPerBatch = 20;

        const batches = [
            {
                id: 1,
                name: "การเพ้นท์เล็บเบื้องต้น รุ่นที่ 1",
                date: "27 พฤษภาคม 2569 - 31 พฤษภาคม 2569",
                type: 'main',
                trainees: [
                    { id: '1-01', name: 'สุภารัตน์ สายประสาท', status: 'รอติดต่อกลับ' }, //0843532526
                    { id: '1-02', name: 'นริศรา  พฤฒากรณ์', status: 'รอติดต่อกลับ' }, //0928518073
                    { id: '1-03', name: 'นางสิรินทรา จอห์นสัน', status: 'รอติดต่อกลับ' }, //0936468921
                    { id: '1-04', name: 'อัจฉริยา คุณารักษ์', status: 'รอติดต่อกลับ' }, //0955399757
                    { id: '1-05', name: 'พิชยา เดชขะรัตน์', status: 'รอติดต่อกลับ' }, //0968516696
                    { id: '1-06', name: 'ณัฏฐกานต์ หันอาสา', status: 'รอติดต่อกลับ' }, //0980506924
                    { id: '1-07', name: 'รักษิตา เขียวพุ่มพวง', status: 'รอติดต่อกลับ' }, //0641961461
                    { id: '1-08', name: 'ภัทริกา พุฒติ', status: 'รอติดต่อกลับ' }, //0939839892
                    { id: '1-09', name: 'เพ็ชรรัตน์ แว่วสอน', status: 'รอติดต่อกลับ' }, //0802872671
                    { id: '1-10', name: 'ธัญทิพย์ ชูสกุลธนเศรษฐ์', status: 'รอติดต่อกลับ' }, //0628783054
                    { id: '1-11', name: 'ณัฎฐณิชา วศินศิริกุล', status: 'รอติดต่อกลับ' }, //0972270526
                    { id: '1-12', name: 'ภัณฑิรา ตาคำ', status: 'รอติดต่อกลับ' }, //0809326624
                    { id: '1-13', name: 'นางสาวอาภัสรา  ขันตี', status: 'รอติดต่อกลับ' }, //0910131631
                    { id: '1-14', name: 'ชิตวรรณ มีหวายหลึม', status: 'รอติดต่อกลับ' }, //0971239193
                    { id: '1-15', name: 'วันวิสา  หนูจันทึก', status: 'รอติดต่อกลับ' },//0953303774
                    { id: '1-16', name: 'อรณี ลิ้มสมบัติอนันต์', status: 'รอติดต่อกลับ' }, //0995928718
                    { id: '1-17', name: 'นส.ชุติกานต์ วงษ์น้อย', status: 'รอติดต่อกลับ' }, //0982234386
                    { id: '1-18', name: 'นางสาว กฤษกร เพิ่มธัญกรรม', status: 'รอติดต่อกลับ' }, //0928685516
                    { id: '1-19', name: 'ภาณุมาศ อานุภาพภราดร', status: 'รอติดต่อกลับ' }, //0820892958
                    { id: '1-20', name: 'นางสาวอินธุอร ค้าสม', status: 'รอติดต่อกลับ' } //0971972786
                ]
            },
            {
                id: 'reserve',
                name: "รายชื่อสำรอง",
                date: "รอเรียกตัวเมื่อมีผู้สละสิทธิ์",
                type: 'reserve',
                trainees: [
                    { id: 'R-01', name: 'พฤฒิพร พยัคฆ์', status: '-' }, //0644790428
                    { id: 'R-02', name: 'ชนิดาภา เศรษฐบุตร', status: '-' }, //0646149665
                    { id: 'R-03', name: 'นส.ธนิกา สกุลเพชรอร่าม', status: '-' }, //0863914595
                    { id: 'R-04', name: 'นางสาว ธนิกา สกุลเพชรอร่าม', status: '-' }, //0863914595
                    { id: 'R-05', name: 'เสาวนีย์ ศรีกาญจนารักษ์', status: '-' }, //'0946632697
					{ id: 'R-06', name: 'น.ส.ชนิดา เจริญศรี', status: '-' }, //0881800888
                    { id: 'R-07', name: 'น.ส มาลัย  เผือกโสภา', status: '-' }, //0615974493
                    { id: 'R-08', name: 'มาลินี โทรักษา', status: '-' }, //0902629553
					{ id: 'R-09', name: 'พิมพ์พจี พงษ์ธรรม', status: '-' }, //0839418986
                    { id: 'R-10', name: 'นิศารัตน์ เสาะแสวง', status: '-' }, //0917645719
					{ id: 'R-11', name: 'อัญชุลี อุดหนุน', status: '-' }, //0818392961
                    { id: 'R-12', name: 'ดำรัสสิริ ประเสริฐสิทธิ์', status: '-' }, //0953419615
                    { id: 'R-13', name: 'พิไลวรรณ หอมเนียม', status: '-' }, //0846266914
					{ id: 'R-14', name: 'สุปาณี บุญเส็ง', status: '-' }, //0623544799
					{ id: 'R-15', name: 'นส นันทิชา แก้วแหวน', status: '-' }, //0917589125
					{ id: 'R-16', name: 'ชุติมา คงเพียร', status: '-' }, //0648495888
					{ id: 'R-17', name: 'น.ส.ธนันชณัฏฐ์ ธรรมมณี', status: '-' } //0924479236
                ]
            }
        ];

        // --- State ---
        let activeTab = 'all'; // 'all', 1, 2, 3, 'reserve'
        let searchQuery = '';

        // --- DOM Elements ---
        const searchInput = document.getElementById('searchInput');
        const tabsContainer = document.getElementById('tabsContainer');
        const listsContainer = document.getElementById('listsContainer');

        // Stats Elements
        const badgeTotalTrainees = document.getElementById('badgeTotalTrainees');
        const badgeTotalReserves = document.getElementById('badgeTotalReserves');
        const statBatches = document.getElementById('statBatches');
        const statTrainees = document.getElementById('statTrainees');
        const statReserves = document.getElementById('statReserves');
        const statAverage = document.getElementById('statAverage');

        // --- Functions ---
        function updateStats() {
            const mainBatches = batches.filter(b => b.type === 'main');
            const reserveBatch = batches.find(b => b.type === 'reserve');
            
            const totalMain = mainBatches.reduce((sum, b) => sum + b.trainees.length, 0);
            const totalReserve = reserveBatch ? reserveBatch.trainees.length : 0;
            const avg = totalMain > 0 ? Math.round(totalMain / mainBatches.length) : 0;

            badgeTotalTrainees.textContent = `${totalMain} ผู้เข้าอบรม`;
            badgeTotalReserves.textContent = `${totalReserve} สำรอง`;
            statBatches.textContent = `${mainBatches.length} รุ่น`;
            statTrainees.textContent = `${totalMain} คน`;
            statReserves.textContent = `${totalReserve} คน`;
            statAverage.textContent = `${avg} คน`;
        }

        function renderTabs() {
            const reserveBatch = batches.find(b => b.type === 'reserve');
            
            let tabsHTML = `
                <button onclick="setActiveTab('all')" class="pb-3 px-1 text-sm font-medium whitespace-nowrap transition-colors ${activeTab === 'all' ? 'text-pink-400 border-b-2 border-pink-500' : 'text-pink-300/70 hover:text-pink-200'}">
                    ทั้งหมด
                </button>
            `;

            batches.filter(b => b.type === 'main').forEach(batch => {
                const isActive = activeTab === batch.id;
                tabsHTML += `
                    <button onclick="setActiveTab(${batch.id})" class="pb-3 px-1 text-sm font-medium whitespace-nowrap transition-colors flex items-center gap-2 ${isActive ? 'text-pink-400 border-b-2 border-pink-500' : 'text-pink-300/70 hover:text-pink-200'}">
                        ${batch.name} <span class="text-xs ${isActive ? 'text-pink-500' : 'text-pink-300/50'}">${batch.trainees.length}/${maxPerBatch}</span>
                    </button>
                `;
            });

            if(reserveBatch) {
                const isActive = activeTab === 'reserve';
                tabsHTML += `
                    <button onclick="setActiveTab('reserve')" class="pb-3 px-1 text-sm font-medium whitespace-nowrap transition-colors flex items-center gap-2 ${isActive ? 'text-orange-400 border-b-2 border-orange-400' : 'text-pink-300/70 hover:text-orange-300'}">
                        <i data-lucide="clock" class="w-4 h-4"></i> รายชื่อสำรอง <span class="text-xs bg-orange-500/20 text-orange-300 px-1.5 py-0.5 rounded-full">${reserveBatch.trainees.length}</span>
                    </button>
                `;
            }

            tabsContainer.innerHTML = tabsHTML;
            lucide.createIcons();
        }

        function renderLists() {
            let html = '';
            
            const batchesToRender = activeTab === 'all' 
                ? batches 
                : batches.filter(b => b.id === activeTab);

            batchesToRender.forEach(batch => {
                // กรองด้วยคำค้นหา
                const filteredTrainees = batch.trainees.filter(t => t.name.toLowerCase().includes(searchQuery.toLowerCase()));
                
                // หากกำลังค้นหาแล้วรุ่นนี้ไม่เจอใครเลย ให้ข้ามไป
                if (searchQuery && filteredTrainees.length === 0) return;

                const isMain = batch.type === 'main';
                const count = batch.trainees.length;
                const percent = isMain ? Math.round((count / maxPerBatch) * 100) : 0;
                const avail = maxPerBatch - count;

                // หัวตาราง
                html += `
                <div class="card-bg rounded-2xl border card-border overflow-hidden shadow-sm shadow-black/5 mb-6">
                    <!-- Batch Header -->
                    <div class="p-5 flex justify-between items-center border-b card-border bg-black/10">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-pink-500/20 rounded-lg flex items-center justify-center text-pink-400">
                                <i data-lucide="bookmark" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <h2 class="text-lg font-bold text-pink-100">${batch.name}</h2>
                                <p class="text-xs text-pink-300/70 mt-0.5 flex items-center gap-1">
                                    <i data-lucide="calendar" class="w-3 h-3"></i> ${batch.date}
                                </p>
                            </div>
                        </div>
                        
                        ${isMain ? `
                        <div class="text-right">
                            <div class="flex items-center justify-end gap-2 text-xs mb-2">
                                <span class="text-pink-300/70">ผู้เข้าอบรม</span>
                                <span class="font-bold text-pink-300">${count} <span class="text-pink-300/50 font-normal">/ ${maxPerBatch} คน</span></span>
                                <span class="text-pink-300/70 ml-4">ว่าง ${avail} ที่</span>
                                <span class="text-pink-400 ml-2 font-medium">${percent}%</span>
                            </div>
                            <div class="w-48 h-1.5 bg-black/20 rounded-full overflow-hidden">
                                <div class="bg-pink-500 h-full rounded-full" style="width: ${percent}%"></div>
                            </div>
                        </div>
                        ` : `
                        <div class="text-right">
                            <div class="text-xs text-pink-300/70 mb-1">จำนวนผู้รอเรียกตัว</div>
                            <div class="font-bold text-orange-400">${count} คน</div>
                        </div>
                        `}
                    </div>

                    <!-- Table Header -->
                    <div class="px-5 py-3 grid grid-cols-12 text-xs font-semibold text-pink-300/70 border-b card-border bg-transparent">
                        <div class="col-span-1 text-center">ลำดับ</div>
                        <div class="col-span-9">ชื่อ-นามสกุล</div>
                        <div class="col-span-2 text-right">สถานะ</div>
                    </div>

                    <!-- Table Body -->
                    <div class="divide-y card-border bg-transparent">
                        ${filteredTrainees.map((trainee, index) => {
                            // หาเลขลำดับดั้งเดิม
                            const originalIndex = batch.trainees.findIndex(t => t.id === trainee.id);
                            const badgeColorClass = trainee.status === 'ยืนยัน' 
                                ? 'bg-pink-500/20 text-pink-300 border-pink-500/30' 
                                : trainee.status === 'รอติดต่อกลับ' 
                                ? 'bg-orange-500/20 text-orange-300 border-orange-500/30'
                                : 'bg-white/5 text-pink-300/40 border-white/10';

                            return `
                            <div class="px-5 py-3 grid grid-cols-12 items-center hover:bg-white/5 transition-colors">
                                <div class="col-span-1 flex justify-center">
                                    <div class="w-6 h-6 rounded-full bg-black/20 text-pink-400 flex items-center justify-center text-xs font-medium">
                                        ${originalIndex + 1}
                                    </div>
                                </div>
                                <div class="col-span-9 font-medium ${trainee.status === 'ว่าง' ? 'text-pink-300/40' : 'text-pink-100'}">
                                    ${trainee.name || '-'}
                                </div>
                                <div class="col-span-2 text-right flex justify-end">
                                    <span class="border px-3 py-1 rounded-full text-xs font-medium ${badgeColorClass}">
                                        ${trainee.status}
                                    </span>
                                </div>
                            </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                `;
            });

            if (html === '') {
                html = `
                <div class="card-bg rounded-2xl border card-border p-12 text-center shadow-sm shadow-black/5">
                    <div class="w-16 h-16 bg-black/10 rounded-full flex items-center justify-center mx-auto mb-4 text-pink-500/50">
                        <i data-lucide="search-x" class="w-8 h-8"></i>
                    </div>
                    <h3 class="text-pink-100 font-medium text-lg">ไม่พบข้อมูล</h3>
                    <p class="text-pink-300/70 text-sm mt-1">ลองเปลี่ยนคำค้นหา หรือเลือกดูรุ่นอื่น</p>
                </div>`;
            }

            listsContainer.innerHTML = html;
            lucide.createIcons();
        }

        // --- Event Handlers ---
        function setActiveTab(tab) {
            activeTab = tab;
            renderTabs();
            renderLists();
        }

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderLists();
        });

        // --- Init ---
        updateStats();
        renderTabs();
        renderLists();

    </script>
</body>
</html>
