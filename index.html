<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายชื่อฝึกอบรม หลักสูตรการทำเบเกอรี่</title>
    <!-- โหลด Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลด Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ตั้งค่าสีพื้นฐานให้เหมือนภาพตัวอย่าง */
        body {
            background-color: #0f172a; /* bg-slate-900 */
            color: #cbd5e1; /* text-slate-300 */
        }
        .card-bg {
            background-color: #1e293b; /* bg-slate-800 */
        }
        .card-border {
            border-color: #334155; /* border-slate-700 */
        }
    </style>
</head>
<body class="font-sans min-h-screen selection:bg-blue-500/30">

    <!-- Top Navigation Bar -->
    <nav class="card-bg border-b card-border sticky top-0 z-20">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/20">
                    <i data-lucide="users" class="w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-white leading-tight">รายชื่อฝึกอบรม หลักสูตรการทำเบเกอรี่</h1>
                    <p class="text-xs text-slate-400">สำนักงานพัฒนาฝีมือแรงงานลพบุรี</p>
                </div>
            </div>
            <div class="flex gap-3">
                <span class="bg-blue-500/10 border border-blue-500/20 text-blue-400 text-xs px-3 py-1.5 rounded-full font-medium" id="badgeTotalTrainees">
                    10 ผู้เข้าอบรม
                </span>
                <span class="bg-orange-500/10 border border-orange-500/20 text-orange-400 text-xs px-3 py-1.5 rounded-full font-medium" id="badgeTotalReserves">
                    3 สำรอง
                </span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6">
        
        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <!-- Card 1 -->
            <div class="card-bg rounded-xl p-5 border card-border flex items-center gap-4">
                <div class="p-3 bg-slate-700/50 rounded-lg text-blue-400">
                    <i data-lucide="layers" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-xs text-slate-400 font-medium">จำนวนรุ่นทั้งหมด</p>
                    <p class="text-xl font-bold text-blue-400 mt-0.5" id="statBatches">3 รุ่น</p>
                </div>
            </div>
            <!-- Card 2 -->
            <div class="card-bg rounded-xl p-5 border card-border flex items-center gap-4">
                <div class="p-3 bg-slate-700/50 rounded-lg text-indigo-400">
                    <i data-lucide="users" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-xs text-slate-400 font-medium">ผู้เข้าอบรมทั้งหมด</p>
                    <p class="text-xl font-bold text-indigo-400 mt-0.5" id="statTrainees">10 คน</p>
                </div>
            </div>
            <!-- Card 3 -->
            <div class="card-bg rounded-xl p-5 border card-border flex items-center gap-4">
                <div class="p-3 bg-slate-700/50 rounded-lg text-orange-400">
                    <i data-lucide="user-minus" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-xs text-slate-400 font-medium">รายชื่อสำรอง</p>
                    <p class="text-xl font-bold text-orange-400 mt-0.5" id="statReserves">3 คน</p>
                </div>
            </div>
            <!-- Card 4 -->
            <div class="card-bg rounded-xl p-5 border card-border flex items-center gap-4">
                <div class="p-3 bg-slate-700/50 rounded-lg text-emerald-400">
                    <i data-lucide="bar-chart-2" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-xs text-slate-400 font-medium">เฉลี่ยต่อรุ่น</p>
                    <p class="text-xl font-bold text-emerald-400 mt-0.5" id="statAverage">3 คน</p>
                </div>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i data-lucide="search" class="w-5 h-5 text-slate-400"></i>
            </div>
            <input
                type="text"
                id="searchInput"
                placeholder="ค้นหารายชื่อผู้เข้าอบรม..."
                class="block w-full pl-11 pr-4 py-3 card-bg border card-border rounded-xl text-slate-200 placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors"
            >
        </div>

        <!-- Tabs -->
        <div class="border-b card-border flex gap-6 overflow-x-auto hide-scrollbar" id="tabsContainer">
            <!-- สร้างผ่าน JS -->
        </div>

        <!-- Lists Container -->
        <div id="listsContainer" class="space-y-6">
            <!-- เนื้อหาถูกสร้างด้วย JS -->
        </div>

    </main>

    <script>
        // --- ข้อมูลจำลองอ้างอิงจากภาพ ---
        const maxPerBatch = 20;

        const batches = [
            {
                id: 1,
                name: "รุ่นที่ 2",
                date: "22 - 26 เมษายน 2569",
                type: 'main',
                trainees: [
                    { id: '2-01', name: 'นางนภัสนันท์ คุ้มญาติ', status: 'ยืนยัน' },
                    { id: '2-02', name: 'นายจิรายุทธ คำพรรณ์', status: 'ยืนยัน' },
                    { id: '2-03', name: 'นิยม แดงศิริ', status: 'ยืนยัน' },
                    { id: '2-04', name: 'นายจิระ นึกโคกรัง', status: 'ยืนยัน' },
                    { id: '2-05', name: 'นางพภัสสรณ์ ปัญญาคุณานนท์', status: 'ยืนยัน' },
                    { id: '2-06', name: 'รุจิราภา นาแรมงาน', status: 'ยืนยัน' },
                    { id: '2-07', name: 'นางสาวบวรลักษณ์ สุวรรณทานนนท์', status: 'ยืนยัน' },
                    { id: '2-08', name: 'นางกัญญาณัฏฐ์ สุวรรณทานนนท์', status: 'ยืนยัน' },
                    { id: '2-09', name: 'กฤษณะ ก้องเกียรติพานิช', status: 'ยืนยัน' },
                    { id: '2-10', name: 'นงนุช สุทธา', status: 'ยืนยัน' },
                    { id: '2-11', name: 'มาลัย เผือกโสภา', status: 'ยืนยัน' },
                    { id: '2-12', name: 'เจษฎา ศิริผล', status: 'ยืนยัน' },
                    { id: '2-13', name: 'ชนิดาภา เศรษฐบุตร', status: 'ยืนยัน' },
                    { id: '2-14', name: 'อุไร คงเพ็ชรศักดิ์', status: 'ยืนยัน' },
                    { id: '2-15', name: 'พิไลวรรณ หอมเนียมดิ์', status: 'ยืนยัน' },
                    { id: '2-16', name: 'เสาวนีย์ ศรีกาญจนารักษ์', status: 'ยืนยัน' },
                    { id: '2-17', name: '', status: 'ว่าง' },
                    { id: '2-18', name: '', status: 'ว่าง' },
                    { id: '2-19', name: '', status: 'ว่าง' },
                    { id: '2-20', name: '', status: 'ว่าง' }
                ]
            },
            {
                id: 'reserve',
                name: "รายชื่อสำรอง",
                date: "รอเรียกตัวเมื่อมีผู้สละสิทธิ์",
                type: 'reserve',
                trainees: [
                    { id: 'R-01', name: 'ชุติกาญจน์ ภาษีผลเต็ม', status: 'รอเรียก รุ่นที่ 2' },
                    { id: 'R-02', name: 'ปรารถนา วินิยม', status: 'รอเรียก รุ่นที่ 2' },
                    { id: 'R-03', name: 'ณัฐพล ประดับบุตร', status: 'รอเรียก รุ่นที่ 2' },
                    { id: 'R-04', name: 'นางสาวธนัตชนก ทับทิมทอง', status: 'รอเรียก รุ่นที่ 2' },
                    { id: 'R-05', name: 'นางธัญญรัตน์ กัญหา', status: 'รอเรียก รุ่นที่ 2' },
                    { id: 'R-06', name: 'นางสาวนัฏฐนันท์ วิระนนท์', status: 'รอเรียก รุ่นที่ 2' },
                ]
            }
        ];

        // --- State ---
        let activeTab = 'all'; // 'all', 1, 2, 3, 'reserve'
        let searchQuery = '';

        // --- DOM Elements ---
        const searchInput = document.getElementById('searchInput');
        const tabsContainer = document.getElementById('tabsContainer');
        const listsContainer = document.getElementById('listsContainer');

        // Stats Elements
        const badgeTotalTrainees = document.getElementById('badgeTotalTrainees');
        const badgeTotalReserves = document.getElementById('badgeTotalReserves');
        const statBatches = document.getElementById('statBatches');
        const statTrainees = document.getElementById('statTrainees');
        const statReserves = document.getElementById('statReserves');
        const statAverage = document.getElementById('statAverage');

        // --- Functions ---
        function updateStats() {
            const mainBatches = batches.filter(b => b.type === 'main');
            const reserveBatch = batches.find(b => b.type === 'reserve');
            
            const totalMain = mainBatches.reduce((sum, b) => sum + b.trainees.length, 0);
            const totalReserve = reserveBatch ? reserveBatch.trainees.length : 0;
            const avg = totalMain > 0 ? Math.round(totalMain / mainBatches.length) : 0;

            badgeTotalTrainees.textContent = `${totalMain} ผู้เข้าอบรม`;
            badgeTotalReserves.textContent = `${totalReserve} สำรอง`;
            statBatches.textContent = `${mainBatches.length} รุ่น`;
            statTrainees.textContent = `${totalMain} คน`;
            statReserves.textContent = `${totalReserve} คน`;
            statAverage.textContent = `${avg} คน`;
        }

        function renderTabs() {
            const reserveBatch = batches.find(b => b.type === 'reserve');
            
            let tabsHTML = `
                <button onclick="setActiveTab('all')" class="pb-3 px-1 text-sm font-medium whitespace-nowrap transition-colors ${activeTab === 'all' ? 'text-blue-400 border-b-2 border-blue-400' : 'text-slate-400 hover:text-slate-200'}">
                    ทั้งหมด
                </button>
            `;

            batches.filter(b => b.type === 'main').forEach(batch => {
                const isActive = activeTab === batch.id;
                tabsHTML += `
                    <button onclick="setActiveTab(${batch.id})" class="pb-3 px-1 text-sm font-medium whitespace-nowrap transition-colors flex items-center gap-2 ${isActive ? 'text-blue-400 border-b-2 border-blue-400' : 'text-slate-400 hover:text-slate-200'}">
                        ${batch.name} <span class="text-xs ${isActive ? 'text-blue-500' : 'text-yellow-500'}">${batch.trainees.length}/${maxPerBatch}</span>
                    </button>
                `;
            });

            if(reserveBatch) {
                const isActive = activeTab === 'reserve';
                tabsHTML += `
                    <button onclick="setActiveTab('reserve')" class="pb-3 px-1 text-sm font-medium whitespace-nowrap transition-colors flex items-center gap-2 ${isActive ? 'text-blue-400 border-b-2 border-blue-400' : 'text-slate-400 hover:text-slate-200'}">
                        <i data-lucide="clock" class="w-4 h-4"></i> รายชื่อสำรอง <span class="text-xs bg-yellow-500/10 text-yellow-500 px-1.5 py-0.5 rounded-full">${reserveBatch.trainees.length}</span>
                    </button>
                `;
            }

            tabsContainer.innerHTML = tabsHTML;
            lucide.createIcons();
        }

        function renderLists() {
            let html = '';
            
            const batchesToRender = activeTab === 'all' 
                ? batches 
                : batches.filter(b => b.id === activeTab);

            batchesToRender.forEach(batch => {
                // กรองด้วยคำค้นหา
                const filteredTrainees = batch.trainees.filter(t => t.name.toLowerCase().includes(searchQuery.toLowerCase()));
                
                // หากกำลังค้นหาแล้วรุ่นนี้ไม่เจอใครเลย ให้ข้ามไป
                if (searchQuery && filteredTrainees.length === 0) return;

                const isMain = batch.type === 'main';
                const count = batch.trainees.length;
                const percent = isMain ? Math.round((count / maxPerBatch) * 100) : 0;
                const avail = maxPerBatch - count;

                // หัวตาราง
                html += `
                <div class="card-bg rounded-2xl border card-border overflow-hidden">
                    <!-- Batch Header -->
                    <div class="p-5 flex justify-between items-center border-b card-border">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-blue-500/10 rounded-lg flex items-center justify-center text-blue-400">
                                <i data-lucide="bookmark" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <h2 class="text-lg font-bold text-white">${batch.name}</h2>
                                <p class="text-xs text-slate-400 mt-0.5 flex items-center gap-1">
                                    <i data-lucide="calendar" class="w-3 h-3"></i> ${batch.date}
                                </p>
                            </div>
                        </div>
                        
                        ${isMain ? `
                        <div class="text-right">
                            <div class="flex items-center justify-end gap-2 text-xs mb-2">
                                <span class="text-slate-400">ผู้เข้าอบรม</span>
                                <span class="font-bold text-blue-400">${count} <span class="text-slate-500 font-normal">/ ${maxPerBatch} คน</span></span>
                                <span class="text-slate-500 ml-4">ว่าง ${avail} ที่</span>
                                <span class="text-slate-400 ml-2">${percent}%</span>
                            </div>
                            <div class="w-48 h-1.5 bg-slate-700 rounded-full overflow-hidden">
                                <div class="bg-blue-500 h-full rounded-full" style="width: ${percent}%"></div>
                            </div>
                        </div>
                        ` : `
                        <div class="text-right">
                            <div class="text-xs text-slate-400 mb-1">จำนวนผู้รอเรียกตัว</div>
                            <div class="font-bold text-orange-400">${count} คน</div>
                        </div>
                        `}
                    </div>

                    <!-- Table Header -->
                    <div class="px-5 py-3 grid grid-cols-12 text-xs font-semibold text-slate-400 border-b card-border">
                        <div class="col-span-1 text-center">ลำดับ</div>
                        <div class="col-span-9">ชื่อ-นามสกุล</div>
                        <div class="col-span-2 text-right">สถานะ</div>
                    </div>

                    <!-- Table Body -->
                    <div class="divide-y card-border">
                        ${filteredTrainees.map((trainee, index) => {
                            // หาเลขลำดับดั้งเดิม
                            const originalIndex = batch.trainees.findIndex(t => t.id === trainee.id);
                            const badgeColorClass = trainee.status === 'ยืนยัน' 
                                ? 'bg-blue-500/20 text-blue-400 border-blue-500/30' 
                                : 'bg-slate-700 text-slate-300 border-slate-600';

                            return `
                            <div class="px-5 py-3 grid grid-cols-12 items-center hover:bg-slate-800/50 transition-colors">
                                <div class="col-span-1 flex justify-center">
                                    <div class="w-6 h-6 rounded-full bg-slate-700/50 text-slate-300 flex items-center justify-center text-xs font-medium">
                                        ${originalIndex + 1}
                                    </div>
                                </div>
                                <div class="col-span-9 font-medium text-slate-200">
                                    ${trainee.name}
                                </div>
                                <div class="col-span-2 text-right flex justify-end">
                                    <span class="border px-3 py-1 rounded-full text-xs font-medium ${badgeColorClass}">
                                        ${trainee.status}
                                    </span>
                                </div>
                            </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                `;
            });

            if (html === '') {
                html = `
                <div class="card-bg rounded-2xl border card-border p-12 text-center">
                    <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-500">
                        <i data-lucide="search-x" class="w-8 h-8"></i>
                    </div>
                    <h3 class="text-slate-300 font-medium text-lg">ไม่พบข้อมูล</h3>
                    <p class="text-slate-500 text-sm mt-1">ลองเปลี่ยนคำค้นหา หรือเลือกดูรุ่นอื่น</p>
                </div>`;
            }

            listsContainer.innerHTML = html;
            lucide.createIcons();
        }

        // --- Event Handlers ---
        function setActiveTab(tab) {
            activeTab = tab;
            renderTabs();
            renderLists();
        }

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderLists();
        });

        // --- Init ---
        updateStats();
        renderTabs();
        renderLists();

    </script>
</body>
</html>
